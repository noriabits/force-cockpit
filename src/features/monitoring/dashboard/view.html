<div id="monitoring-panel">
  <div class="monitoring-toolbar">
    <div class="monitoring-toolbar-top">
      <button class="btn btn-primary" id="monitoring-add-btn"></button>
    </div>
    <div class="visibility-filter" id="monitoring-visibility-filter"></div>
    <input
      type="text"
      class="text-input monitoring-search"
      id="monitoring-search"
      placeholder="Filter charts..."
    />
    <div class="category-pills" id="monitoring-folder-pills"></div>
    <div class="sub-category-pills" id="monitoring-sub-pills"></div>
  </div>
  <div class="monitoring-grid" id="monitoring-grid"></div>
  <p class="feature-no-results" id="monitoring-no-results" style="display: none"></p>
  <div class="error-box" id="monitoring-load-error" style="display: none"></div>
</div>
