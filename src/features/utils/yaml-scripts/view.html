<div id="yaml-scripts-panel">
  <div class="yaml-scripts-filter">
    <input type="text" class="text-input" id="yaml-search" placeholder="Search scripts..." />
    <button class="btn yaml-refresh-btn" id="yaml-refresh-btn" title="Refresh scripts list">
      &#8635; Refresh
    </button>
    <button class="btn btn-primary" id="yaml-new-btn"></button>
  </div>
  <div id="yaml-new-form" class="yaml-new-form">
    <div class="yaml-form-row">
      <label class="yaml-form-label yaml-form-label--required" for="yaml-form-name"></label>
      <input type="text" class="text-input" id="yaml-form-name" />
    </div>
    <div class="yaml-form-row">
      <label class="yaml-form-label" for="yaml-form-description"></label>
      <textarea
        class="text-input yaml-form-textarea"
        id="yaml-form-description"
        rows="2"
      ></textarea>
    </div>
    <div class="yaml-form-row yaml-form-row--inline">
      <div class="yaml-form-col">
        <label class="yaml-form-label" for="yaml-form-type"></label>
        <select class="text-input" id="yaml-form-type">
          <option value="apex"></option>
          <option value="command"></option>
          <option value="js"></option>
          <option value="ai"></option>
        </select>
      </div>
      <div class="yaml-form-col">
        <label class="yaml-form-label yaml-form-label--required" for="yaml-form-folder"></label>
        <div class="yaml-folder-combobox">
          <input type="text" class="text-input" id="yaml-form-folder" autocomplete="off" />
          <button type="button" class="yaml-folder-toggle" id="yaml-folder-toggle" tabindex="-1">
            &#9662;
          </button>
          <div class="yaml-folder-dropdown" id="yaml-folder-dropdown"></div>
        </div>
      </div>
      <div class="yaml-form-col">
        <label class="yaml-form-label" for="yaml-form-source"></label>
        <select class="text-input" id="yaml-form-source">
          <option value="inline"></option>
          <option value="file"></option>
        </select>
      </div>
    </div>
    <div class="yaml-form-row yaml-form-ai-only" id="yaml-form-model-row" style="display: none">
      <label class="yaml-form-label" for="yaml-form-model" id="yaml-form-model-label"></label>
      <select class="text-input" id="yaml-form-model">
        <option value="auto"></option>
      </select>
      <div class="yaml-form-hint" id="yaml-form-model-hint" style="display: none"></div>
    </div>
    <div class="yaml-form-row yaml-form-row--inline">
      <label class="yaml-form-label" for="yaml-form-private" id="yaml-form-private-label"></label>
      <input type="checkbox" id="yaml-form-private" />
    </div>
    <div
      class="yaml-form-row yaml-form-row--inline"
      id="yaml-form-apex-defaults-row"
      style="display: none"
    >
      <label class="yaml-form-label" id="yaml-form-apex-defaults-label"></label>
      <label class="yaml-log-filter-label">
        <input type="checkbox" id="yaml-form-filter-user-debug" />
        <span id="yaml-form-filter-user-debug-label"></span>
      </label>
      <label class="yaml-log-filter-label">
        <input type="checkbox" id="yaml-form-format-json" />
        <span id="yaml-form-format-json-label"></span>
      </label>
    </div>
    <div class="yaml-form-row" id="yaml-form-file-row">
      <label class="yaml-form-label yaml-form-label--required" for="yaml-form-file-path"></label>
      <div class="input-with-paste">
        <input type="text" class="text-input" id="yaml-form-file-path" autocomplete="off" />
        <button type="button" class="btn yaml-browse-btn" id="yaml-form-browse-btn"></button>
      </div>
    </div>
    <div class="yaml-form-row">
      <label class="yaml-form-label" id="yaml-form-inputs-label"></label>
      <div id="yaml-form-inputs-list" class="yaml-form-inputs-list"></div>
      <button type="button" class="btn yaml-add-input-btn" id="yaml-add-input-btn"></button>
    </div>
    <div class="yaml-form-row yaml-form-ai-only" id="yaml-form-gather-row" style="display: none">
      <label class="yaml-log-filter-label">
        <input type="checkbox" id="yaml-form-gather-enabled" />
        <span id="yaml-form-gather-label"></span>
      </label>
      <div id="yaml-form-gather-body" style="display: none">
        <select class="text-input" id="yaml-form-gather-type">
          <option value="soql"></option>
          <option value="apex"></option>
          <option value="apex-file"></option>
        </select>
        <textarea
          class="text-input yaml-form-gather-content"
          id="yaml-form-gather-content"
          rows="3"
          spellcheck="false"
        ></textarea>
        <div class="input-with-paste" id="yaml-form-gather-file-row" style="display: none">
          <input
            type="text"
            class="text-input"
            id="yaml-form-gather-file-path"
            autocomplete="off"
          />
          <button
            type="button"
            class="btn yaml-browse-btn"
            id="yaml-form-gather-browse-btn"
          ></button>
        </div>
      </div>
    </div>
    <div class="yaml-form-row" id="yaml-form-content-row">
      <label class="yaml-form-label yaml-form-label--required" id="yaml-form-content-label"></label>
      <div class="yaml-code-editor">
        <div class="yaml-code-gutter" id="yaml-code-gutter" aria-hidden="true">1</div>
        <div class="yaml-code-body">
          <pre
            class="yaml-code-highlight"
            aria-hidden="true"
          ><code id="yaml-highlight-code"></code></pre>
          <textarea
            class="text-input yaml-code-textarea"
            id="yaml-form-content"
            rows="6"
            spellcheck="false"
          ></textarea>
        </div>
      </div>
    </div>
    <div
      class="yaml-form-row yaml-form-row--inline yaml-form-ai-only"
      id="yaml-form-followup-row"
      style="display: none"
    >
      <label
        class="yaml-form-label"
        for="yaml-form-allow-followup"
        id="yaml-form-followup-label"
      ></label>
      <input type="checkbox" id="yaml-form-allow-followup" />
    </div>
    <div
      class="yaml-form-row yaml-form-row--inline yaml-form-ai-only"
      id="yaml-form-read-files-row"
      style="display: none"
    >
      <label
        class="yaml-form-label"
        for="yaml-form-allow-read-files"
        id="yaml-form-read-files-label"
      ></label>
      <input type="checkbox" id="yaml-form-allow-read-files" />
    </div>
    <div class="yaml-form-row yaml-form-ai-only" id="yaml-form-skills-row" style="display: none">
      <label class="yaml-form-label" id="yaml-form-skills-label"></label>
      <div id="yaml-form-skills" class="yaml-form-skills-list"></div>
      <div class="yaml-form-hint" id="yaml-form-skills-hint" style="display: none"></div>
    </div>
    <div class="error-box" id="yaml-form-error"></div>
    <div class="feature-actions">
      <button class="btn btn-primary" id="yaml-form-save-btn"></button>
      <button class="btn" id="yaml-form-cancel-btn"></button>
      <button class="btn yaml-form-delete-btn" id="yaml-form-delete-btn"></button>
    </div>
  </div>
  <div class="visibility-filter" id="yaml-visibility-filter"></div>
  <div class="category-pills" id="yaml-folder-pills"></div>
  <div class="sub-category-pills" id="yaml-sub-pills"></div>
  <div id="yaml-scripts-list"></div>
  <div id="yaml-no-results" class="feature-no-results" style="display: none"></div>
  <div id="yaml-load-error" class="error-box"></div>
</div>
