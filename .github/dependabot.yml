version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 10
    groups:
      salesforce:
        patterns:
          - "@salesforce/*"
          - "jsforce"
    allow:
      - dependency-type: "production"
    reviewers:
      - "noriabits"
