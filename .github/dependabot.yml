version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: "development"
      salesforce:
        patterns:
          - "@salesforce/*"
          - "jsforce"
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    reviewers:
      - "noriabits"
